<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحمام الزاجل</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007A3D">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0b1e38;
color:white;
}

header{
background:#082040;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#FFD66B;
box-shadow:0 3px 10px rgba(0,0,0,.4);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.cover{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.cover img{
width:100%;
display:block;
}

.info{
text-align:center;
padding:25px;
}

.info h1{
font-size:34px;
color:#FFD66B;
margin-bottom:15px;
}

.info p{
font-size:20px;
line-height:1.9;
margin-bottom:25px;
}

.author{

font-size:22px;

color:#ddd;

margin-bottom:30px;

}

.btn{

display:inline-block;

padding:16px 45px;

background:#d4a017;

color:white;

font-size:22px;

text-decoration:none;

border-radius:12px;

transition:.3s;

}

.btn:hover{

background:#b78600;

transform:scale(1.05);

}

footer{

margin-top:40px;

text-align:center;

padding:20px;

font-size:18px;

color:#ccc;

}

@media(max-width:700px){

.info h1{

font-size:28px;

}

.info p{

font-size:18px;

}

.btn{

width:100%;

font-size:20px;

}

}

</style>

</head>

<body>

<header>

📖 كتاب الحمام الزاجل

</header>

<div class="container">

<div class="cover">

<img src="../cover.jpg">

</div>

<div class="info">

<h1>الدليل الشامل للتربية والتدريب والسباقات</h1>

<p>

النسخة التفاعلية الكاملة.

</p>

<div class="author">

تأليف

<br><br>

يحيى علي حسن الناعم

</div>

<a class="btn" href="../page2.jpg">

ابدأ القراءة

</a>

</div>

</div>

<footer>

الاتحاد الفلسطيني لرياضة الحمام الزاجل
</footer>

</body>

</html>
